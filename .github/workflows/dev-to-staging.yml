name: Dev to Staging

on:
  push:
    branches: [staging]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx dvc

      - name: Pull data from DVC
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull

      - name: Run full test suite
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MODEL_STAGE: ${{ secrets.MODEL_STAGE }}
        run: |
          cd backend
          python -m pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-backend:staging

      - name: Build and push frontend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-frontend:staging
          build-args: |
            VITE_BACKEND_URL=${{ secrets.STAGING_BACKEND_URL }}

  model-promotion:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLflow
        run: pip install mlflow dagshub

      - name: Run quality gates
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          ACCURACY_THRESHOLD: "0.75"
          F1_THRESHOLD: "0.75"
          RECALL_THRESHOLD: "0.70"
          LATENCY_THRESHOLD_MS: "2000"
        run: |
          python - << 'EOF'
          import os
          import sys
          import time
          import json
          import mlflow
          import mlflow.sklearn
          import numpy as np
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          os.environ["MLFLOW_TRACKING_USERNAME"] = os.environ["MLFLOW_TRACKING_USERNAME"]
          os.environ["MLFLOW_TRACKING_PASSWORD"] = os.environ["MLFLOW_TRACKING_PASSWORD"]

          client = MlflowClient()
          model_name = os.environ["MODEL_NAME"]
          accuracy_threshold = float(os.environ["ACCURACY_THRESHOLD"])
          f1_threshold = float(os.environ["F1_THRESHOLD"])
          recall_threshold = float(os.environ["RECALL_THRESHOLD"])
          latency_threshold_ms = float(os.environ["LATENCY_THRESHOLD_MS"])

          test_input = np.array([[63, 1, 3, 145, 233, 1, 0, 150, 0, 2.3, 0, 0, 1]])

          versions = client.get_latest_versions(model_name, stages=["Production"])
          if not versions:
              print("FAILED: No Production model found!")
              sys.exit(1)

          run_id = versions[0].run_id
          run = client.get_run(run_id)

          gates_passed = []
          gates_failed = []

          # ── Gate 1: Accuracy ──────────────────────────────────────────────
          accuracy = run.data.metrics.get("accuracy", 0)
          if accuracy >= accuracy_threshold:
              gates_passed.append(f"Accuracy gate PASSED: {accuracy:.4f} >= {accuracy_threshold}")
          else:
              gates_failed.append(f"Accuracy gate FAILED: {accuracy:.4f} < {accuracy_threshold}")

          # ── Gate 2: F1 Score ──────────────────────────────────────────────
          f1 = run.data.metrics.get("f1_score", 0)
          if f1 >= f1_threshold:
              gates_passed.append(f"F1 Score gate PASSED: {f1:.4f} >= {f1_threshold}")
          else:
              gates_failed.append(f"F1 Score gate FAILED: {f1:.4f} < {f1_threshold}")

          # ── Gate 3: Recall ────────────────────────────────────────────────
          recall = run.data.metrics.get("recall", 0)
          if recall >= recall_threshold:
              gates_passed.append(f"Recall gate PASSED: {recall:.4f} >= {recall_threshold}")
          else:
              gates_failed.append(f"Recall gate FAILED: {recall:.4f} < {recall_threshold}")

          # ── Gate 4: Latency ───────────────────────────────────────────────
          try:
              model_uri = f"runs:/{run_id}/model"
              model = mlflow.sklearn.load_model(model_uri)

              start = time.time()
              for _ in range(10):
                  model.predict(test_input)
              avg_latency_ms = (time.time() - start) / 10 * 1000

              if avg_latency_ms <= latency_threshold_ms:
                  gates_passed.append(
                      f"Latency gate PASSED: {avg_latency_ms:.1f}ms <= {latency_threshold_ms}ms"
                  )
              else:
                  gates_failed.append(
                      f"Latency gate FAILED: {avg_latency_ms:.1f}ms > {latency_threshold_ms}ms"
                  )
          except Exception as e:
              gates_failed.append(f"Latency gate FAILED: {e}")

          # ── Gate 5: Smoke test ────────────────────────────────────────────
          try:
              prediction = model.predict(test_input)
              probability = model.predict_proba(test_input)[0]

              if (
                  prediction[0] in [0, 1]
                  and len(probability) == 2
                  and abs(sum(probability) - 1.0) < 0.001
              ):
                  gates_passed.append(
                      f"Smoke test PASSED: prediction={prediction[0]}, "
                      f"probability={probability[1]:.4f}"
                  )
              else:
                  gates_failed.append("Smoke test FAILED: invalid prediction output")
          except Exception as e:
              gates_failed.append(f"Smoke test FAILED: {e}")

          # ── Summary ───────────────────────────────────────────────────────
          print("\n========== QUALITY GATE RESULTS ==========")
          for msg in gates_passed:
              print(f"  PASSED  {msg}")
          for msg in gates_failed:
              print(f"  FAILED  {msg}")
          print(f"==========================================")
          print(f"Passed: {len(gates_passed)}/{len(gates_passed) + len(gates_failed)}")

          if gates_failed:
              print("\nQuality gates FAILED — model will not be promoted")
              sys.exit(1)
          else:
              print("\nAll quality gates PASSED — model is ready for production")
          EOF