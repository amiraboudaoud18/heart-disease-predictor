name: Dev to Staging

on:
  push:
    branches: [staging]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install dvc

      - name: Pull data from DVC
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull

      - name: Train and register model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MODEL_STAGE: Staging
        run: |
          cd backend
          python train.py

      - name: Transition new model to Staging
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          python - << 'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          os.environ["MLFLOW_TRACKING_USERNAME"] = os.environ["MLFLOW_TRACKING_USERNAME"]
          os.environ["MLFLOW_TRACKING_PASSWORD"] = os.environ["MLFLOW_TRACKING_PASSWORD"]

          client = MlflowClient()
          model_name = os.environ["MODEL_NAME"]

          # Get latest registered version (just trained)
          versions = client.search_model_versions(f"name='{model_name}'")
          latest = sorted(versions, key=lambda v: int(v.version), reverse=True)[0]

          print(f"Transitioning {model_name} v{latest.version} to Staging...")
          client.transition_model_version_stage(
              name=model_name,
              version=latest.version,
              stage="Staging",
              archive_existing_versions=False
          )
          print(f"Model v{latest.version} is now in Staging stage")
          EOF

  test:
    needs: train
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx dvc

      - name: Pull data from DVC
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull

      - name: Run full test suite
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MODEL_STAGE: ${{ secrets.MODEL_STAGE }}
        run: |
          cd backend
          python -m pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-backend:staging

      - name: Build and push frontend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-frontend:staging
          build-args: |
            VITE_BACKEND_URL=${{ secrets.STAGING_BACKEND_URL }}

  quality-gates:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLflow
        run: pip install mlflow dagshub scikit-learn

      - name: Run quality gates on Staging model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          ACCURACY_THRESHOLD: "0.75"
          F1_THRESHOLD: "0.75"
          RECALL_THRESHOLD: "0.70"
        run: |
          python - << 'EOF'
          import os
          import sys
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          os.environ["MLFLOW_TRACKING_USERNAME"] = os.environ["MLFLOW_TRACKING_USERNAME"]
          os.environ["MLFLOW_TRACKING_PASSWORD"] = os.environ["MLFLOW_TRACKING_PASSWORD"]

          client = MlflowClient()
          model_name = os.environ["MODEL_NAME"]
          accuracy_threshold = float(os.environ["ACCURACY_THRESHOLD"])
          f1_threshold = float(os.environ["F1_THRESHOLD"])
          recall_threshold = float(os.environ["RECALL_THRESHOLD"])

          # Check STAGING model — not Production
          versions = client.get_latest_versions(model_name, stages=["Staging"])
          if not versions:
              print("FAILED: No Staging model found!")
              sys.exit(1)

          run_id = versions[0].run_id
          run = client.get_run(run_id)
          version = versions[0].version

          print(f"Evaluating model v{version} in Staging stage")

          gates_passed = []
          gates_failed = []

          accuracy = run.data.metrics.get("accuracy", 0)
          if accuracy >= accuracy_threshold:
              gates_passed.append(f"Accuracy gate PASSED: {accuracy:.4f} >= {accuracy_threshold}")
          else:
              gates_failed.append(f"Accuracy gate FAILED: {accuracy:.4f} < {accuracy_threshold}")

          f1 = run.data.metrics.get("f1_score", 0)
          if f1 >= f1_threshold:
              gates_passed.append(f"F1 Score gate PASSED: {f1:.4f} >= {f1_threshold}")
          else:
              gates_failed.append(f"F1 Score gate FAILED: {f1:.4f} < {f1_threshold}")

          recall = run.data.metrics.get("recall", 0)
          if recall >= recall_threshold:
              gates_passed.append(f"Recall gate PASSED: {recall:.4f} >= {recall_threshold}")
          else:
              gates_failed.append(f"Recall gate FAILED: {recall:.4f} < {recall_threshold}")

          print("\n========== QUALITY GATE RESULTS ==========")
          for msg in gates_passed:
              print(f"  PASSED  {msg}")
          for msg in gates_failed:
              print(f"  FAILED  {msg}")
          print(f"==========================================")
          print(f"Passed: {len(gates_passed)}/{len(gates_passed) + len(gates_failed)}")

          if gates_failed:
              print("\nQuality gates FAILED — model stays in Staging, Production NOT affected")
              sys.exit(1)
          else:
              print("\nAll quality gates PASSED — ready to promote to Production")
          EOF

  deploy-staging:
    needs: quality-gates
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render staging redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_BACKEND_ID }}/deploys" \
            -d '{"clearCache": false}'

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_FRONTEND_ID }}/deploys" \
            -d '{"clearCache": false}'

          echo "Staging redeploy triggered!"