name: Staging to Main

on:
  push:
    branches: [main]

jobs:
  promote-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLflow
        run: pip install mlflow dagshub

      - name: Promote latest model to Production
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          python - << 'EOF'
          import os
          import sys
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          os.environ["MLFLOW_TRACKING_USERNAME"] = os.environ["MLFLOW_TRACKING_USERNAME"]
          os.environ["MLFLOW_TRACKING_PASSWORD"] = os.environ["MLFLOW_TRACKING_PASSWORD"]

          client = MlflowClient()
          model_name = os.environ["MODEL_NAME"]

          # Get latest registered version
          versions = client.search_model_versions(f"name='{model_name}'")
          if not versions:
              print("No model versions found!")
              sys.exit(1)

          latest = sorted(versions, key=lambda v: int(v.version), reverse=True)[0]
          print(f"Latest version: {latest.version}")
          print(f"Current stage: {latest.current_stage}")

          # Only promote if not already in Production
          if latest.current_stage != "Production":
              client.transition_model_version_stage(
                  name=model_name,
                  version=latest.version,
                  stage="Production",
                  archive_existing_versions=True
              )
              print(f"Promoted {model_name} v{latest.version} to Production!")
          else:
              print(f"{model_name} v{latest.version} is already in Production")
          EOF

  deploy-production:
    needs: promote-model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote staging images to production
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-backend:staging
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-backend:staging \
                     ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-backend:production
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-backend:production

      - name: Build and push frontend (production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-frontend:production
          build-args: |
            VITE_BACKEND_URL=${{ secrets.PRODUCTION_BACKEND_URL }}

      - name: Verify production model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          pip install mlflow
          python - << 'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          os.environ["MLFLOW_TRACKING_USERNAME"] = os.environ["MLFLOW_TRACKING_USERNAME"]
          os.environ["MLFLOW_TRACKING_PASSWORD"] = os.environ["MLFLOW_TRACKING_PASSWORD"]

          client = MlflowClient()
          model_name = os.environ["MODEL_NAME"]
          versions = client.get_latest_versions(model_name, stages=["Production"])

          if versions:
              v = versions[0]
              print(f"Production model: {model_name} v{v.version}")
              print(f"Run ID: {v.run_id}")
              print("Production deployment verified!")
          else:
              print("No Production model found!")
              exit(1)
          EOF

      - name: Trigger Render production redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_BACKEND_ID }}/deploys" \
            -d '{"clearCache": false}'

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_FRONTEND_ID }}/deploys" \
            -d '{"clearCache": false}'

          echo "Production redeploy triggered!"